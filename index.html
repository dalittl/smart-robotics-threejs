<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#050810" />
  <title>Apollo Eve</title>
  <meta name="description" content="Apollo Eve — Robots you'll fall for." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="landing">
  <!-- Fixed 3D canvas background -->
  <canvas id="scene"></canvas>
  <div class="grain"></div>
  <div class="vignette"></div>

  <!-- Centered logo -->
  <main class="stage">
    <header class="brand">
      <h1 class="logo__word">Apollo&nbsp;Eve<i class="logo__period"></i></h1>
    </header>
    <span class="coming">Coming Soon</span>
  </main>

  <!-- Interactive hotspot that tracks the orbiting dot -->
  <button class="hotspot" id="hotspot" type="button" aria-label="About us">
    <span class="hotspot__pulse"></span>
    <span class="hotspot__label">About</span>
  </button>

  <!-- About Us dialog -->
  <div class="modal" id="aboutModal" aria-hidden="true">
    <div class="modal__backdrop" data-close></div>
    <div class="modal__card" role="dialog" aria-modal="true" aria-labelledby="aboutTitle">
      <button class="modal__close" type="button" data-close aria-label="Close">&times;</button>
      <span class="modal__kicker">About Us</span>
      <h2 id="aboutTitle">Building solutions for our next takeoff.</h2>
      <button class="modal__cta" type="button" data-close>Close</button>
    </div>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
